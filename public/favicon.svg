<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#030014"/>
  <!-- Red to neon gradient definition -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E11D48"/>
      <stop offset="100%" stop-color="#FF003C"/>
    </linearGradient>
  </defs>
  <!-- Robot head outline -->
  <rect x="16" y="18" width="32" height="24" rx="5" stroke="url(#g)" stroke-width="3" fill="none"/>
  <!-- Eyes -->
  <circle cx="24" cy="28" r="3.5" fill="url(#g)"/>
  <circle cx="40" cy="28" r="3.5" fill="url(#g)"/>
  <!-- Mouth -->
  <rect x="22" y="35" width="20" height="3" rx="1.5" fill="url(#g)"/>
  <!-- Antenna -->
  <line x1="32" y1="18" x2="32" y2="11" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="9" r="2.5" fill="url(#g)"/>
  <!-- Ears / sides -->
  <rect x="11" y="26" width="5" height="8" rx="2" fill="url(#g)"/>
  <rect x="48" y="26" width="5" height="8" rx="2" fill="url(#g)"/>
  <!-- Code brackets below -->
  <text x="20" y="58" font-family="monospace" font-size="13" font-weight="bold" fill="#E11D48">&lt;/&gt;</text>
</svg>
